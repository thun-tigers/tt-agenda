services:
  web:
    build: .
    image: ghcr.io/swisi/tt-agenda:latest
    container_name: tt-agenda
    ports:
      - "8086:5000"
    volumes:
      - tt-agenda:/app/instance
    depends_on:
      tt-postgres-agenda:
        condition: service_healthy
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-postgresql+psycopg://tt_agenda:tt_agenda_password@tt-postgres-agenda:5432/tt_agenda}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-http://localhost:8085}
      - SSO_SHARED_SECRET=${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      - TT_INFRA_INTERNAL_URL=${TT_INFRA_INTERNAL_URL:-http://host.docker.internal:8084}
      - SSO_EXPECTED_AUDIENCE=${SSO_EXPECTED_AUDIENCE:-tt-agenda}
      - SSO_AUTO_PROVISION_USERS=${SSO_AUTO_PROVISION_USERS:-true}
      - SSO_SYNC_ROLE=${SSO_SYNC_ROLE:-true}
      - LOG_LEVEL=INFO
      - WEBHOOK_ENABLED=true
      - WEBHOOK_URL=https://n8n.3624.ch/webhook/messaging
      - TZ=Europe/Zurich
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tt-postgres-agenda:
    image: postgres:16
    container_name: tt-postgres-agenda
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tt_agenda}
      - POSTGRES_USER=${POSTGRES_USER:-tt_agenda}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tt_agenda_password}
      - TZ=${TZ:-Europe/Zurich}
    volumes:
      - tt-agenda-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tt_agenda} -d ${POSTGRES_DB:-tt_agenda}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  tt-agenda:
    driver: local
  tt-agenda-postgres-data:
    driver: local
